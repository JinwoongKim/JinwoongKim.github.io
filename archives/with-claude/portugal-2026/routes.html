<style>
  :root {
    --bg: #faf8f5; --bg-card: #ffffff;
    --ink: #1a1a1a; --ink-soft: #4a4a4a; --ink-muted: #8a8a8a;
    --line: #e5e1da;
    --accent: #7a2e2e; --accent-soft: #c4a5a5;
    --azul: #2d5a8a; --warn: #b8541c; --done: #4a7c4a;
    --serif: 'Cormorant Garamond', 'Noto Serif KR', serif;
    --serif-kr: 'Noto Serif KR', serif;
    --mono: 'JetBrains Mono', monospace;

    --d2: #d4663a;  /* 알파마 - 주황 */
    --d3: #4a7c4a;  /* 벨렘 - 초록 */
    --d4: #7a2e2e;  /* 신트라 - 와인 */
    --d5: #6a5acd;  /* 이동 - 보라 */
    --d6: #2d5a8a;  /* 포르투 시내 - 파랑 */
    --d7: #8b6f1a;  /* 가이아 - 골드 */

  * { box-sizing: border-box; margin: 0; padding: 0; }

  .app { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }

  .sidebar { background: var(--ink); color: #f0ece4; padding: 28px 22px; overflow-y: auto; border-right: 1px solid #000; }
  .brand { font-family: var(--serif); font-size: 26px; font-style: italic; font-weight: 500; line-height: 1.1; }
  .brand .dot { color: var(--accent-soft); }
  .brand-sub { font-family: var(--mono); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #a09b8f; margin-top: 4px; margin-bottom: 28px; }
  .back-link { display: inline-block; font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent-soft); border: none; padding-bottom: 14px; margin-bottom: 14px; border-bottom: 1px solid #2a2a2a; width: 100%; }
  .back-link:hover { color: #fff; }
  a { text-decoration: none; }

  .day-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
  .day-btn { width: 100%; background: none; border: none; color: #d4cfc3; font-family: var(--serif-kr); font-size: 13px; text-align: left; padding: 12px 14px; cursor: pointer; display: flex; align-items: center; gap: 12px; border-left: 3px solid transparent; transition: all .15s; font-weight: 500; }
  .day-btn:hover { background: rgba(255,255,255,.04); color: #fff; }
  .day-btn.active { background: rgba(255,255,255,.06); color: #fff; }
  .day-btn .dot-color { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .day-btn .day-num { font-family: var(--mono); font-size: 9px; color: #6a6558; min-width: 28px; }
  .day-btn .day-label { flex: 1; }
  .day-btn.active.d2 { border-left-color: var(--d2); }
  .day-btn.active.d3 { border-left-color: var(--d3); }
  .day-btn.active.d4 { border-left-color: var(--d4); }
  .day-btn.active.d5 { border-left-color: var(--d5); }
  .day-btn.active.d6 { border-left-color: var(--d6); }
  .day-btn.active.d7 { border-left-color: var(--d7); }

  .sidebar-section { margin-top: 28px; padding-top: 16px; border-top: 1px solid #2a2a2a; }
  .sidebar-section h4 { font-family: var(--mono); font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: #a09b8f; margin-bottom: 10px; font-weight: 400; }

  .stop-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
  .stop-item { font-size: 12px; color: #c4bfaf; padding: 6px 8px; border-radius: 3px; cursor: pointer; transition: background .15s; display: grid; grid-template-columns: 44px 18px 1fr; gap: 6px; align-items: flex-start; }
  .stop-item:hover { background: rgba(255,255,255,.05); color: #fff; }
  .stop-item .stop-time { font-family: var(--mono); font-size: 10px; color: var(--accent-soft); font-weight: 600; padding-top: 1px; }
  .stop-item .stop-num { font-family: var(--mono); font-size: 10px; color: #6a6558; padding-top: 1px; }
  .stop-item .stop-name { line-height: 1.4; }

  .main { position: relative; height: 100vh; }
  #map { width: 100%; height: 100%; background: #e8e5dd; }

  .info-panel { position: absolute; top: 16px; right: 16px; width: 340px; background: var(--bg-card); border: 1px solid var(--line); padding: 18px 20px; z-index: 1000; max-height: calc(100vh - 32px); overflow-y: auto; box-shadow: 0 4px 20px -8px rgba(0,0,0,.15); }
  .info-panel h2 { font-family: var(--serif); font-size: 22px; font-weight: 500; line-height: 1.2; margin-bottom: 4px; }
  .info-panel .date-row { font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 12px; }
  .info-panel .summary { font-size: 12.5px; color: var(--ink-soft); line-height: 1.55; padding-bottom: 12px; margin-bottom: 12px; border-bottom: 1px dashed var(--line); }

  .info-stop { display: grid; grid-template-columns: 48px 22px 1fr; gap: 10px; padding: 8px 0; font-size: 12.5px; line-height: 1.5; align-items: flex-start; border-bottom: 1px dotted var(--line); }
  .info-stop:last-child { border-bottom: none; }
  .info-stop .stop-time-box { font-family: var(--mono); font-size: 11px; font-weight: 700; color: var(--accent); padding-top: 4px; letter-spacing: -0.3px; }
  .info-stop .stop-circle { width: 22px; height: 22px; border-radius: 50%; color: #fff; font-family: var(--mono); font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .info-stop .stop-detail strong { display: block; font-weight: 600; color: var(--ink); margin-bottom: 1px; }
  .info-stop .stop-detail .stop-meta { font-size: 11px; color: var(--ink-muted); }
  .info-stop .stop-detail .stop-transit { font-size: 11px; color: var(--ink-muted); margin-top: 4px; padding-top: 4px; border-top: 1px dotted #eee; font-family: var(--mono); }

  .info-panel .note { margin-top: 12px; padding: 10px 12px; background: #fdf6f0; font-size: 11.5px; color: var(--ink-soft); line-height: 1.5; border-left: 2px solid var(--accent-soft); }

  .leaflet-popup-content-wrapper { border-radius: 4px; }
  .leaflet-popup-content { font-family: var(--serif-kr); font-size: 13px; margin: 12px 14px; line-height: 1.5; min-width: 160px; }
  .leaflet-popup-content .popup-time { display: inline-block; font-family: var(--mono); font-size: 10px; font-weight: 700; padding: 2px 6px; background: var(--accent); color: #fff; letter-spacing: 0.5px; margin-bottom: 6px; border-radius: 2px; }
  .leaflet-popup-content strong { display: block; font-size: 14px; margin-bottom: 4px; color: var(--accent); }
  .leaflet-popup-content .popup-meta { font-size: 12px; color: var(--ink-soft); }

  .marker-pin { width: 28px; height: 28px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); border: 2px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,.3); display: flex; align-items: center; justify-content: center; }
  .marker-pin span { transform: rotate(45deg); color: #fff; font-family: var(--mono); font-size: 11px; font-weight: 700; }
  .marker-start { background: #4a7c4a; }
  .marker-end { background: #b8541c; }

  .toggle-info { position: absolute; top: 16px; right: 16px; z-index: 1001; background: var(--ink); color: #fff; border: none; padding: 8px 12px; font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; border-radius: 2px; display: none; }
  .toggle-info:hover { background: var(--accent); }

  @media (max-width: 880px) {
    .app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    .sidebar { padding: 14px 14px; max-height: 200px; }
    .brand-sub { margin-bottom: 12px; }
    .day-list { flex-direction: row; overflow-x: auto; gap: 4px; }
    .day-btn { white-space: nowrap; border-left: none; border-bottom: 2px solid transparent; padding: 8px 14px; flex-shrink: 0; }
    .day-btn.active { border-left: none; }
    .day-btn.active.d2 { border-bottom-color: var(--d2); }
    .day-btn.active.d3 { border-bottom-color: var(--d3); }
    .day-btn.active.d4 { border-bottom-color: var(--d4); }
    .day-btn.active.d5 { border-bottom-color: var(--d5); }
    .day-btn.active.d6 { border-bottom-color: var(--d6); }
    .day-btn.active.d7 { border-bottom-color: var(--d7); }
    .sidebar-section { display: none; }
    .info-panel { width: calc(100% - 32px); max-height: 60vh; display: none; }
    .info-panel.shown { display: block; }
    .toggle-info { display: block; }
  }
</style>
</head>

</div>

const map = L.map('map', { zoomControl: true, scrollWheelZoom: true }).setView([38.7223, -9.1393], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18,
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
}).addTo(map);

let currentLayer = null;

function makeMarker(stop, color, isStart, isEnd) {
  const bgColor = isStart ? '#4a7c4a' : (isEnd ? '#b8541c' : color);
  const html = `<div class="marker-pin" style="background:${bgColor};"><span>${stop.n}</span></div>`;
  return L.divIcon({ html, iconSize: [28, 28], iconAnchor: [14, 28], className: '', popupAnchor: [0, -28] });
}

function renderDay(dayKey) {
  const day = DAYS[dayKey];
  if (currentLayer) { map.removeLayer(currentLayer); }
  const group = L.layerGroup();

  const coords = day.stops.map(s => s.coord);
  L.polyline(coords, { color: day.color, weight: 3, opacity: 0.7, dashArray: '6,4' }).addTo(group);

  day.stops.forEach((stop, i) => {
    const isStart = i === 0;
    const isEnd = i === day.stops.length - 1;
    const marker = L.marker(stop.coord, { icon: makeMarker(stop, day.color, isStart, isEnd) });
    const timeHtml = stop.time ? `<span class="popup-time">${stop.time}</span>` : '';
    const popup = `${timeHtml}<strong>${stop.n}. ${stop.name}</strong><span class="popup-meta">${stop.meta}</span>`;
    marker.bindPopup(popup);
    marker.addTo(group);
  });

  group.addTo(map);
  currentLayer = group;

  const bounds = L.latLngBounds(coords);
  map.fitBounds(bounds, { padding: [50, 50] });

  renderInfoPanel(day);
  renderStopList(day);
}

function renderInfoPanel(day) {
  const panel = document.getElementById('infoPanel');
  let html = `<h2>${day.title}</h2><div class="date-row">${day.date}</div><div class="summary">${day.summary}</div>`;
  day.stops.forEach(stop => {
    html += `<div class="info-stop">
      <div class="stop-time-box">${stop.time || ''}</div>
      <div class="stop-circle" style="background:${day.color};">${stop.n}</div>
      <div class="stop-detail">
        <strong>${stop.name}</strong>
        <div class="stop-meta">${stop.meta}</div>
        ${stop.transit ? `<div class="stop-transit">${stop.transit}</div>` : ''}
      </div>
    </div>`;
  });
  if (day.note) html += `<div class="note">${day.note}</div>`;
  panel.innerHTML = html;
}

function renderStopList(day) {
  const list = document.getElementById('stopList');
  list.innerHTML = day.stops.map(s =>
    `<li class="stop-item" data-coord="${s.coord[0]},${s.coord[1]}">
      <span class="stop-time">${s.time || ''}</span>
      <span class="stop-num">${s.n}.</span>
      <span class="stop-name">${s.name}</span>
    </li>`
  ).join('');
  list.querySelectorAll('.stop-item').forEach(item => {
    item.addEventListener('click', () => {
      const [lat, lng] = item.dataset.coord.split(',').map(Number);
      map.flyTo([lat, lng], 16, { duration: 0.8 });
    });
  });
}

document.querySelectorAll('.day-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderDay(btn.dataset.day);
    history.replaceState(null, '', '#' + btn.dataset.day);
    const panel = document.getElementById('infoPanel');
    if (window.innerWidth <= 880) panel.classList.remove('shown');
  });
});

document.getElementById('toggleInfo').addEventListener('click', () => {
  document.getElementById('infoPanel').classList.toggle('shown');
});

function setInitialDay() {
  const hash = window.location.hash.replace('#', '');
  const validDays = ['d2', 'd3', 'd4', 'd5', 'd6', 'd7'];
  const dayKey = validDays.includes(hash) ? hash : 'd2';
  document.querySelectorAll('.day-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.day === dayKey);
  });
  renderDay(dayKey);
}

window.addEventListener('hashchange', setInitialDay);
setInitialDay();
</script>
