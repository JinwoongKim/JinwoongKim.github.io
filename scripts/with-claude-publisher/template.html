<!DOCTYPE html>
<!--
  ============================================================
  WITH-CLAUDE TEMPLATE
  ============================================================
  이 템플릿을 베이스로 새 페이지를 만든다.

  채워야 할 부분 (검색해서 교체):
  - {{TITLE}}            : 브라우저 탭 제목
  - {{EYEBROW}}          : 상단 카테고리 (예: "Detail Report · Packing")
  - {{H1_MAIN}}          : 메인 제목 (예: "준비물")
  - {{H1_EM}}            : 강조될 부분 (예: "리포트.")
  - {{SUBTITLE}}         : 부제목
  - {{BREADCRUMB_TOPIC}} : 빵 부스러기 경로 (예: "portugal-2026 / packing")
  - {{CONTENT}}          : 본문 (sections)
  - {{COMPILED_DATE}}    : 작성일 (YYYY.MM.DD)
  - {{TOPIC_TAG}}        : 푸터의 주제 태그 (예: "PORTUGAL · PACKING REPORT · 2026")

  색상 강조 컬러는 페이지 톤에 따라 변경 가능:
  - 항공/교통/예약 등 정보형 → --azul (azulejo blue)
  - 준비물/체크리스트 → --olive
  - 음식/추억/감성 → --terra (terracotta)
  - 와인/주류 → --port (포트 와인 색)
  H1의 <em>, eyebrow, h2 .num 색상을 한 톤으로 통일.
  ============================================================
-->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ============ COLOR & TYPE TOKENS ============ */
  :root {
    --bg: #f7f1e3;
    --paper: #fffaf0;
    --paper-2: #fbf6ea;
    --ink: #1d1d1b;
    --ink-soft: #4a4742;
    --ink-faint: #6f6a62;
    --rule: #d9cfb8;
    --rule-strong: #b9ad90;

    --azul: #1f3a5f;
    --azul-deep: #122644;
    --azul-soft: #4a6b8a;
    --terra: #c0552d;
    --terra-light: #e89968;
    --port: #6b2737;
    --olive: #7a8b5c;
    --gold: #b8893d;

    --critical: #a52a2a;
    --warn-bg: #fef3e3;

    /* 페이지 톤 — 필요 시 변경 */
    --accent: var(--terra);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', -apple-system, 'Apple SD Gothic Neo', sans-serif;
    font-weight: 400;
    line-height: 1.65;
    background-image:
      radial-gradient(ellipse at 10% 0%, rgba(192,85,45,0.04), transparent 50%),
      radial-gradient(ellipse at 100% 30%, rgba(31,58,95,0.05), transparent 50%);
    background-attachment: fixed;
  }

  /* ============ LAYOUT ============ */
  .page {
    max-width: 1100px;
    margin: 0 auto;
    padding: clamp(28px, 5vw, 64px) clamp(20px, 4vw, 56px) 100px;
  }

  /* ============ NAV ============ */
  .home-link {
    display: inline-block;
    margin-bottom: 28px;
    padding: 8px 14px;
    background: var(--paper);
    border: 1px solid var(--rule);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--azul);
    text-decoration: none;
    letter-spacing: 1px;
    transition: all .2s;
  }
  .home-link:hover {
    background: var(--azul);
    color: white;
    border-color: var(--azul);
  }

  .breadcrumb {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .breadcrumb a { color: var(--accent); text-decoration: none; }

  /* ============ MASTHEAD ============ */
  .masthead {
    border-bottom: 3px double var(--rule-strong);
    padding-bottom: 36px;
    margin-bottom: 48px;
  }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin: 24px 0 20px;
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(40px, 6vw, 72px);
    font-weight: 400;
    font-variation-settings: "opsz" 144;
    line-height: 1;
    color: var(--azul-deep);
    letter-spacing: -1.5px;
  }
  h1 em {
    font-style: italic;
    color: var(--accent);
    font-weight: 300;
  }
  .subtitle {
    font-family: 'Fraunces', serif;
    font-size: 19px;
    font-style: italic;
    color: var(--ink-soft);
    margin-top: 16px;
  }

  /* ============ SECTIONS ============ */
  section { margin-bottom: 64px; }

  h2 {
    font-family: 'Fraunces', serif;
    font-size: 32px;
    font-weight: 500;
    color: var(--azul-deep);
    margin-bottom: 24px;
    display: flex;
    align-items: baseline;
    gap: 16px;
    letter-spacing: -0.5px;
  }
  h2 .num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 2px;
    font-weight: 400;
  }
  h2::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--rule-strong);
    margin-left: 8px;
  }

  h3 {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--azul);
    margin-bottom: 12px;
  }

  p { font-size: 15px; color: var(--ink-soft); margin-bottom: 12px; }
  p strong { color: var(--azul-deep); }

  /* ============ CARDS ============ */
  .card {
    background: var(--paper);
    border: 1px solid var(--rule);
    padding: 22px 26px;
    border-radius: 2px;
  }
  .card.accent-bar { border-left: 4px solid var(--accent); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 18px;
  }

  /* ============ TABLES ============ */
  table.std {
    width: 100%;
    border-collapse: collapse;
    background: var(--paper);
    font-size: 14px;
    box-shadow: 0 2px 8px rgba(31,58,95,0.05);
  }
  table.std th {
    background: var(--azul-deep);
    color: var(--paper);
    padding: 13px 16px;
    text-align: left;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.5px;
  }
  table.std td {
    padding: 13px 16px;
    border-bottom: 1px solid var(--rule);
    vertical-align: top;
  }
  table.std tr:last-child td { border-bottom: none; }

  /* ============ CALLOUTS ============ */
  .callout {
    padding: 22px 28px;
    margin: 24px 0;
    border-radius: 2px;
  }
  .callout.info { background: rgba(31,58,95,0.05); border-left: 4px solid var(--azul); }
  .callout.warning { background: var(--warn-bg); border-left: 4px solid var(--critical); }
  .callout.recommend { background: rgba(192,85,45,0.06); border-left: 4px solid var(--terra); }
  .callout h3 { font-family: 'Fraunces', serif; font-size: 20px; margin-bottom: 10px; }
  .callout.info h3 { color: var(--azul-deep); }
  .callout.warning h3 { color: var(--critical); }
  .callout.recommend h3 { color: var(--terra); }
  .callout p { font-size: 14px; line-height: 1.7; }

  /* ============ LISTS ============ */
  ul.clean { list-style: none; }
  ul.clean li {
    padding: 5px 0 5px 18px;
    position: relative;
    font-size: 14.5px;
    color: var(--ink-soft);
  }
  ul.clean li::before {
    content: '▸';
    position: absolute;
    left: 0;
    color: var(--accent);
  }
  ul.clean li strong { color: var(--azul-deep); }

  /* ============ SOURCE NOTE ============ */
  .source-note {
    margin-top: 14px;
    padding: 10px 14px;
    background: rgba(31,58,95,0.04);
    font-size: 11.5px;
    color: var(--ink-faint);
    font-family: 'JetBrains Mono', monospace;
    border-left: 2px solid var(--azul-soft);
  }

  /* ============ FOOTER ============ */
  .footer {
    margin-top: 80px;
    padding-top: 32px;
    border-top: 3px double var(--rule-strong);
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 2px;
  }
  .footer .ornament {
    font-size: 18px;
    color: var(--accent);
    margin-bottom: 12px;
  }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 700px) {
    h1 { font-size: 40px; letter-spacing: -1px; }
    h2 { font-size: 24px; }
  }
</style>
</head>
<body>

<div class="page">

  <a href="../index.html" class="home-link">← with-claude 허브로</a>

  <div class="breadcrumb">
    <a href="../index.html">archives / with-claude</a> / {{BREADCRUMB_TOPIC}}
  </div>

  <header class="masthead">
    <div class="eyebrow">{{EYEBROW}}</div>
    <h1>{{H1_MAIN}} <em>{{H1_EM}}</em></h1>
    <p class="subtitle">{{SUBTITLE}}</p>
  </header>

  <!-- ============================================================
       CONTENT START — 여기에 sections 채우기
       ============================================================ -->

  {{CONTENT}}

  <!-- ============================================================
       CONTENT END
       ============================================================ -->

  <div class="footer">
    <div class="ornament">✦</div>
    <div>{{TOPIC_TAG}}</div>
    <div style="margin-top:8px; opacity:0.6;">compiled {{COMPILED_DATE}}</div>
  </div>

</div>

</body>
</html>
